name: modaol-autocomplete-monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install requests

      - name: 모니터링 + 순위 기록
        run: python tracker_ci.py record

      - name: tracker_data.js 생성
        run: |
          python -c "
          with open('tracker_data.json', 'r', encoding='utf-8') as f:
              data = f.read().strip()
          with open('tracker_data.js', 'w', encoding='utf-8') as f:
              f.write('var TRACKER_DATA = ' + data + ';')
          "

      - name: 트래커 데이터 커밋
        run: |
          git config user.name "modaol-bot"
          git config user.email "bot@modaol.co.kr"
          git add tracker_data.json tracker_data.js
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%dT%H:%M)"
          git push
